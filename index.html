<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
}

/* PDF full screen */
iframe {
    width: 100%;
    height: 100vh;
    border: none;
}

/* Download button */
.download-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 999;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}

/* hide selection / basic protection */
body {
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
</style>
</head>

<body>

<!-- Download button -->
<a class="download-btn" href="document.pdf" download>
⬇ Download PDF
</a>

<!-- PDF viewer -->
<iframe src="document.pdf"></iframe>

<script>
// basic protection
document.addEventListener('contextmenu', event => event.preventDefault());

// block common shortcuts
document.addEventListener('keydown', function(e) {
    if (
        e.ctrlKey && 
        (e.key === 's' || e.key === 'p' || e.key === 'u')
    ) {
        e.preventDefault();
    }
});
</script>

</body>
</html>
